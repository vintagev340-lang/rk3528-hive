[defaults]
inventory          = inventory/tailscale.yaml
remote_user        = root
host_key_checking  = False          # 新节点首次连接不验证 host key
timeout            = 30
forks              = 20             # 并发 20 台，100 台节点分 5 批
stdout_callback    = yaml
interpreter_python = auto_silent

[ssh_connection]
ssh_args           = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
pipelining         = True           # 减少 SSH 握手次数，批量操作提速
