# Ansible 动态 Inventory：从 Tailscale 获取 tag:hive 的所有节点
# 文档: https://docs.ansible.com/ansible/latest/collections/community/general/tailscale_inventory.html
#
# 依赖:
#   ansible-galaxy collection install community.general
#
# 使用:
#   TAILSCALE_API_TOKEN=xxx ansible-inventory -i inventory/tailscale.yaml --list
#   ansible -i inventory/tailscale.yaml tag_hive -m ping

plugin: community.general.tailscale

# API token 从环境变量读取（不要写进文件）
api_key: "{{ lookup('env', 'TAILSCALE_API_TOKEN') }}"

# 只包含 tag:hive 的节点
tags:
  - tag:hive

# 用 Tailscale IP (100.x.x.x) 作为连接地址（无论节点在哪个网络后面都能到达）
vars:
  ansible_host: "{{ tailscale_ip }}"
