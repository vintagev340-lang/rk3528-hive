# /etc/nginx/sites-available/hive
# 部署：
#   sudo ln -s $(pwd)/management/nginx/hive.conf /etc/nginx/sites-available/hive
#   sudo ln -s /etc/nginx/sites-available/hive /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d example.com -d hive.sakurapuare.com
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Grafana ──────────────────────────────────────────────────────────────
    # serve_from_sub_path=true：Grafana 自己处理 /grafana/ 前缀
    # proxy_pass 不带 URI，nginx 将完整路径原样转发给容器
    # 关键：GF_SERVER_ROOT_URL 必须以 / 结尾
    location /grafana/ {
        proxy_pass         http://127.0.0.1:4231;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Grafana Live（WebSocket）
    location /grafana/api/live/ {
        proxy_pass         http://127.0.0.1:4231;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # ── Prometheus ───────────────────────────────────────────────────────────
    # --web.external-url 已含 /prometheus/，Prometheus 自己处理该前缀
    location /prometheus/ {
        proxy_pass         http://127.0.0.1:4230;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── Status Page：hive.sakurapuare.com ────────────────────────────────────────
# 访问根路径时透明代理 Grafana Public Dashboard
# 步骤：
#   1. 在 Grafana 创建 Status Dashboard 后点 Share → Public dashboard → Enable
#   2. 复制生成的 UID（URL 末尾那段，如 abc123def456...）
#   3. 将下方 __PUBLIC_DASHBOARD_UID__ 替换为实际 UID
#   4. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name hive.sakurapuare.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name hive.sakurapuare.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 根路径 → 全屏 iframe 嵌入 Public Dashboard，URL 始终为 hive.sakurapuare.com
    location = / {
        default_type 'text/html';
        return 200 '<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hive Network Status</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #111; }
    iframe { display: block; width: 100%; height: 100vh; border: none; }
  </style>
</head>
<body>
  <iframe src="/grafana/public-dashboards/845b15f049bc47fd99c6f463a77021f0"
          allowfullscreen
          loading="eager">
  </iframe>
</body>
</html>';
    }

    # Grafana 资产 / API（Public Dashboard 页面会请求这些路径）
    location /grafana/ {
        proxy_pass         http://127.0.0.1:4231;
        proxy_set_header   Host              example.com;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /grafana/api/live/ {
        proxy_pass         http://127.0.0.1:4231;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       example.com;
    }
}
