# /etc/nginx/sites-available/example.com
# 部署：
#   sudo ln -s $(pwd)/management/nginx/hive.conf /etc/nginx/sites-available/example.com
#   sudo ln -s /etc/nginx/sites-available/example.com /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d example.com
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Grafana ──────────────────────────────────────────────────────────────
    # serve_from_sub_path=true：Grafana 自己处理 /grafana/ 前缀
    # proxy_pass 不带 URI，nginx 将完整路径原样转发给容器
    # 关键：GF_SERVER_ROOT_URL 必须以 / 结尾
    location /grafana/ {
        proxy_pass         http://127.0.0.1:4231;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Grafana Live（WebSocket）
    location /grafana/api/live/ {
        proxy_pass         http://127.0.0.1:4231;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # ── Prometheus ───────────────────────────────────────────────────────────
    # --web.external-url 已含 /prometheus/，Prometheus 自己处理该前缀
    location /prometheus/ {
        proxy_pass         http://127.0.0.1:4230;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
