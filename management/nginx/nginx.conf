events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        # ── Hive Node Registry ────────────────────────────────────────────
        # Go 路由无 /api 前缀；nginx 剥离后转发。
        # 例：GET /api/nodes → Go 收到 GET /nodes
        # 外部路径（含 nginx 前缀）与 docs/NODE-REGISTRY-API.md 一致。
        location = /api {
            return 301 $scheme://$host/api/;
        }
        location /api/ {
            proxy_pass http://127.0.0.1:8080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ── Prometheus ────────────────────────────────────────────────────
        # --web.external-url 已含 /prometheus/，Prometheus 自己处理该前缀，原样转发
        location /prometheus/ {
            proxy_pass http://127.0.0.1:4230;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Grafana ───────────────────────────────────────────────────────
        # GF_SERVER_SERVE_FROM_SUB_PATH=true，Grafana 自己处理 /grafana/ 前缀，原样转发
        location /grafana/ {
            proxy_pass http://127.0.0.1:4231;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Grafana Live（WebSocket）
        location /grafana/api/live/ {
            proxy_pass http://127.0.0.1:4231;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location = / {
            return 302 /grafana/;
        }
    }
}
