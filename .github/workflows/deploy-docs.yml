name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "package.json"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

jobs:
  # ── Cloudflare Pages ─────────────────────────────────────────
  deploy-cloudflare:
    name: Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build docs
        run: npm run docs:build
        # base 默认 /，CF Pages 使用自定义域名无需子路径

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy docs/.vitepress/dist --project-name "$DOCS_PROJECT_NAME"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          DOCS_PROJECT_NAME: ${{ vars.DOCS_PROJECT_NAME || 'hive-docs' }}

  # ── GitHub Pages ─────────────────────────────────────────────
  deploy-github:
    name: GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v4
        id: pages
        # 自动检测 GitHub Pages base path（如 /rk3528-hive/）

      - run: npm ci

      - name: Build docs
        run: npm run docs:build
        env:
          VITE_BASE: ${{ steps.pages.outputs.base_path }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
