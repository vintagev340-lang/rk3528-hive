name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "package.json"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy docs/.vitepress/dist --project-name "$DOCS_PROJECT_NAME"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          DOCS_PROJECT_NAME: ${{ vars.DOCS_PROJECT_NAME || 'hive-docs' }}
